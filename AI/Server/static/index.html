<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas AI — MasterRepo Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d14;--panel:#13131f;--border:#1e2a3a;--accent:#2277cc;
    --accent2:#00aaff;--text:#d4d4d4;--muted:#6a7a8a;--user-bg:#0a1828;
    --ai-bg:#091209;--err:#cc3333;--ok:#22aa44;--warn:#ccaa22;
    --font:'Segoe UI',system-ui,sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font);
    display:flex;flex-direction:column;height:100vh;overflow:hidden}
  #header{background:var(--panel);border-bottom:1px solid var(--border);
    padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  #header h1{font-size:1.1rem;color:var(--accent2);font-weight:600;letter-spacing:.04em}
  .tag{font-size:.72rem;background:#0a2040;border:1px solid var(--accent);
    color:var(--accent2);padding:2px 8px;border-radius:3px}
  #status-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);
    margin-left:auto;flex-shrink:0}
  #status-dot.ok{background:var(--ok)} #status-dot.err{background:var(--err)}
  #status-text{font-size:.75rem;color:var(--muted)}
  #main{display:flex;flex:1;overflow:hidden}
  #sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
  #sidebar h2{font-size:.75rem;color:var(--muted);padding:12px 14px 6px;
    text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
  #file-tree{flex:1;overflow-y:auto;padding:6px 0}
  .tree-item{padding:4px 14px;font-size:.78rem;cursor:pointer;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;gap:6px}
  .tree-item:hover{background:#1a2030}
  .tree-item.dir{color:var(--accent2)}
  #sidebar-footer{padding:10px 14px;border-top:1px solid var(--border)}
  #reindex-btn{width:100%;padding:6px;background:#0a2040;border:1px solid var(--accent);
    color:var(--accent2);border-radius:4px;cursor:pointer;font-size:.78rem}
  #reindex-btn:hover{background:#0d2a56}
  #index-stats{font-size:.7rem;color:var(--muted);margin-top:6px;text-align:center}
  #chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;border-radius:6px;padding:10px 14px;font-size:.85rem;
    line-height:1.55;word-wrap:break-word}
  .msg.user{background:var(--user-bg);border:1px solid #1a3050;
    align-self:flex-end;color:#aaddff}
  .msg.assistant{background:var(--ai-bg);border:1px solid #0f2a0f;
    align-self:flex-start;color:#b8d8b8}
  .msg.system{background:#1a1a10;border:1px solid #3a3a10;
    align-self:flex-start;color:#ccc8a0;font-size:.78rem}
  .msg .role{font-size:.68rem;color:var(--muted);margin-bottom:4px;
    text-transform:uppercase;letter-spacing:.06em}
  .msg pre{background:#080808;border:1px solid var(--border);border-radius:4px;
    padding:8px;margin-top:6px;overflow-x:auto;font-size:.78rem}
  .msg code{background:#0c0c18;border-radius:2px;padding:1px 4px;font-size:.8rem}
  #typing{display:none;align-self:flex-start;padding:8px 14px;
    background:var(--ai-bg);border:1px solid #0f2a0f;border-radius:6px;
    font-size:.82rem;color:var(--muted)}
  #typing.show{display:block}
  #input-bar{padding:12px 16px;background:var(--panel);
    border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
  #msg-input{flex:1;background:#080810;border:1px solid var(--border);
    color:var(--text);border-radius:5px;padding:9px 12px;font-size:.88rem;
    font-family:var(--font);resize:none;min-height:40px;max-height:140px;outline:none}
  #msg-input:focus{border-color:var(--accent)}
  #msg-input::placeholder{color:var(--muted)}
  #send-btn{padding:9px 18px;background:var(--accent);border:none;color:#fff;
    border-radius:5px;cursor:pointer;font-size:.88rem;flex-shrink:0;height:40px}
  #send-btn:hover{background:var(--accent2)}
  #send-btn:disabled{background:#1a2a3a;color:var(--muted);cursor:not-allowed}
  #clear-btn{padding:9px 12px;background:#1a1a2a;border:1px solid var(--border);
    color:var(--muted);border-radius:5px;cursor:pointer;font-size:.82rem;height:40px}
  #clear-btn:hover{color:var(--err);border-color:var(--err)}
  #file-modal{display:none;position:fixed;inset:0;background:#000a;
    z-index:100;align-items:center;justify-content:center}
  #file-modal.show{display:flex}
  #file-panel{background:var(--panel);border:1px solid var(--border);
    border-radius:8px;width:80vw;max-height:80vh;display:flex;flex-direction:column}
  #file-panel-header{padding:10px 16px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px}
  #file-panel-title{flex:1;font-size:.85rem;color:var(--accent2)}
  #file-panel-close{background:none;border:none;color:var(--muted);
    font-size:1.1rem;cursor:pointer;padding:2px 6px}
  #file-panel-close:hover{color:var(--err)}
  #file-content{flex:1;overflow:auto;padding:14px;font-family:monospace;
    font-size:.78rem;line-height:1.5;color:#b8c8a0;white-space:pre}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>
</head>
<body>
<div id="header">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
    <polygon points="11,2 20,18 2,18" fill="none" stroke="#2277cc" stroke-width="1.5"/>
    <circle cx="11" cy="11" r="3" fill="#00aaff" opacity=".8"/>
  </svg>
  <h1>Atlas AI</h1>
  <span class="tag">MasterRepo Assistant</span>
  <span class="tag" id="model-tag">codellama</span>
  <div id="status-dot" title="Ollama status"></div>
  <span id="status-text">checking…</span>
</div>
<div id="main">
  <div id="sidebar">
    <h2>📁 Project Files</h2>
    <div id="file-tree"></div>
    <div id="sidebar-footer">
      <button id="reindex-btn" onclick="reindex()">↻ Re-index Project</button>
      <div id="index-stats"></div>
    </div>
  </div>
  <div id="chat-wrap">
    <div id="messages"></div>
    <div id="typing">⏳ Atlas AI is thinking…</div>
    <div id="input-bar">
      <textarea id="msg-input" rows="1"
        placeholder="Ask about the project… or /read Engine/Core/Engine.h to view a file"
        onkeydown="handleKey(event)"></textarea>
      <button id="clear-btn" onclick="clearHistory()" title="Clear chat">🗑</button>
      <button id="send-btn" onclick="sendMessage()">Send ↵</button>
    </div>
  </div>
</div>
<div id="file-modal">
  <div id="file-panel">
    <div id="file-panel-header">
      <span id="file-panel-title">File</span>
      <button id="file-panel-close" onclick="closeFileModal()">✕</button>
    </div>
    <div id="file-content"></div>
  </div>
</div>
<script>
const API='';
async function checkStatus(){
  try{
    const r=await fetch(`${API}/api/status`);
    const d=await r.json();
    const dot=document.getElementById('status-dot');
    const txt=document.getElementById('status-text');
    const mtag=document.getElementById('model-tag');
    if(d.ollama){dot.className='ok';txt.textContent=`Ollama ✓ | ${(d.indexed_files||0).toLocaleString()} files indexed`;}
    else{dot.className='err';txt.textContent='Ollama offline — run: ollama serve';}
    if(d.model)mtag.textContent=d.model;
    document.getElementById('index-stats').textContent=
      d.indexed_files?`${d.indexed_files.toLocaleString()} files · ${(d.indexed_lines||0).toLocaleString()} lines`:'Not indexed yet';
  }catch{}
}
checkStatus();setInterval(checkStatus,15000);
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderContent(text){
  text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${escHtml(c.trim())}</code></pre>`);
  text=text.replace(/`([^`]+)`/g,(_,c)=>`<code>${escHtml(c)}</code>`);
  text=text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\n/g,'<br>');
  return text;
}
function appendMessage(role,content){
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const lbl=role==='user'?'You':role==='assistant'?'Atlas AI':'System';
  div.innerHTML=`<div class="role">${lbl}</div>${renderContent(content)}`;
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
  return div;
}
async function sendMessage(){
  const inp=document.getElementById('msg-input');
  const btn=document.getElementById('send-btn');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';inp.style.height='';
  appendMessage('user',msg);
  btn.disabled=true;document.getElementById('typing').classList.add('show');
  try{
    const r=await fetch(`${API}/api/chat`,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d=await r.json();
    appendMessage('assistant',d.reply||'⚠ No response received.');
  }catch(e){appendMessage('assistant',`⚠ Error: ${e.message}`);}
  finally{btn.disabled=false;document.getElementById('typing').classList.remove('show');}
}
function handleKey(e){
  e.target.style.height='';
  e.target.style.height=Math.min(e.target.scrollHeight,140)+'px';
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}
async function clearHistory(){
  await fetch(`${API}/api/history`,{method:'DELETE'});
  document.getElementById('messages').innerHTML='';
  appendMessage('system','Chat cleared. Project index retained.');
}
async function reindex(){
  const btn=document.getElementById('reindex-btn');
  btn.textContent='⏳ Indexing…';btn.disabled=true;
  try{
    const r=await fetch(`${API}/api/index`,{method:'POST',
      headers:{'Content-Type':'application/json'},body:'{"force":true}'});
    const d=await r.json();
    document.getElementById('index-stats').textContent=
      `${d.files.toLocaleString()} files · ${d.lines.toLocaleString()} lines`;
    appendMessage('system',`✓ Re-indexed: ${d.files.toLocaleString()} files, ${d.lines.toLocaleString()} lines.`);
  }catch(e){appendMessage('system',`⚠ Reindex failed: ${e.message}`);}
  finally{btn.textContent='↻ Re-index Project';btn.disabled=false;}
}
let currentPath='';
async function loadTree(path=''){
  currentPath=path;
  const tree=document.getElementById('file-tree');
  tree.innerHTML='<div class="tree-item" style="color:var(--muted)">Loading…</div>';
  try{
    const r=await fetch(`${API}/api/files?path=${encodeURIComponent(path)}`);
    const d=await r.json();
    tree.innerHTML='';
    if(path){
      const back=document.createElement('div');back.className='tree-item dir';
      back.innerHTML='<span>⬆</span> ..';
      back.onclick=()=>loadTree(path.split('/').slice(0,-1).join('/'));
      tree.appendChild(back);
    }
    for(const f of d.files||[]){
      const item=document.createElement('div');
      item.className='tree-item'+(f.is_dir?' dir':'');
      const icon=f.is_dir?'📁':iconFor(f.name);
      item.innerHTML=`<span>${icon}</span>${escHtml(f.name)}`;
      if(f.is_dir)item.onclick=()=>loadTree(f.path);
      else item.onclick=()=>openFile(f.path);
      tree.appendChild(item);
    }
  }catch{tree.innerHTML='<div class="tree-item" style="color:var(--muted)">Start server to browse</div>';}
}
function iconFor(n){
  const e=n.split('.').pop().toLowerCase();
  return{cpp:'⚙',h:'⚙',hpp:'⚙',py:'🐍',md:'📝',json:'{}',sh:'🔧',bat:'🔧'}[e]||'📄';
}
async function openFile(path){
  document.getElementById('file-panel-title').textContent=path;
  document.getElementById('file-content').textContent='Loading…';
  document.getElementById('file-modal').classList.add('show');
  try{
    const r=await fetch(`${API}/api/file?path=${encodeURIComponent(path)}`);
    const d=await r.json();
    document.getElementById('file-content').textContent=d.content||'(empty)';
  }catch(e){document.getElementById('file-content').textContent=`Error: ${e.message}`;}
}
function closeFileModal(){document.getElementById('file-modal').classList.remove('show');}
document.getElementById('file-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('file-modal'))closeFileModal();
});
loadTree('');
appendMessage('system',
  'Welcome to Atlas AI — your local MasterRepo assistant.\n\n'+
  'I have full context of the entire project. You can:\n'+
  '  • Ask about any system, file, or architecture\n'+
  '  • Type /read Engine/Core/Engine.h to read a file\n'+
  '  • Browse files in the sidebar\n'+
  '  • Plan features or ask for code generation\n\n'+
  'Runs fully offline via Ollama (localhost:11434).\n'+
  'Run: ollama serve && ollama pull codellama'
);
(async()=>{
  try{
    const r=await fetch(`${API}/api/history`);
    const d=await r.json();
    if(d.history&&d.history.length>2)
      for(const m of d.history)appendMessage(m.role,m.content);
  }catch{}
})();
</script>
</body>
</html>
